apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gfs-rollout
  namespace: core
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # The deploy workflow runs `kubectl apply -f manifests/nats/nats.yaml`, which
  # bundles a PVC, ConfigMap, and Service. apply needs read + create/update on
  # each of these resource types in this namespace.
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "configmaps", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gfs-rollout-binding
  namespace: core
subjects:
  - kind: ServiceAccount
    name: gfs-ci
    namespace: cicd
roleRef:
  kind: Role
  name: gfs-rollout
  apiGroup: rbac.authorization.k8s.io

