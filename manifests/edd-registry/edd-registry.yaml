apiVersion: apps/v1
kind: Deployment
metadata:
  name: edd-registry
  namespace: core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edd-registry
  template:
    metadata:
      labels:
        app: edd-registry
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: edd-registry
      nodeSelector:
        backend: "true"
      imagePullSecrets:
        - name: regcred
      containers:
        - name: registry
          image: eddisonso/ecloud-registry:latest
          imagePullPolicy: Always
          args:
            - -addr
            - 0.0.0.0:8080
            - -master
            - gfs-master:9000
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: registry-db-credentials
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: edd-cloud-auth
                  key: JWT_SECRET
            - name: GFS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gfs-jwt-secret
                  key: GFS_JWT_SECRET
            - name: NATS_URL
              value: "nats://nats:4222"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /v2/
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /v2/
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: edd-registry
  namespace: core
spec:
  selector:
    app: edd-registry
  ports:
    - port: 80
      targetPort: 8080
